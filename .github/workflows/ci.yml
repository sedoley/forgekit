name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Test commit #2
      - name: Test commit #25
      - name: Test commit #28
      - name: Test commit #41
      - name: Test commit #44
      - name: Test commit #54
      - name: Test commit #60
      - name: Test commit #72
      - name: Test commit #74
      - name: Test commit #78
      - name: Test commit #83
      - name: Test commit #95
      - name: Test commit #100
      - name: Test commit #114
